<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mum & Dad Banking</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --border: #e0e0e0;
      --primary: #1a73e8;
      --primary-dark: #1557b0;
      --danger: #d93025;
      --success: #188038;
      --text: #202124;
      --muted: #5f6368;
      --tag-financial: #e8f0fe;
      --tag-financial-text: #1a73e8;
      --tag-other: #fce8e6;
      --tag-other-text: #d93025;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 8px;
    }

    h1 { font-size: 1.25rem; font-weight: 600; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 8px 14px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary  { background: var(--primary); color: #fff; }
    .btn-resolve  { background: var(--success); color: #fff; padding: 5px 10px; font-size: 0.8rem; }
    .btn-small    { background: var(--border); color: var(--text); padding: 5px 10px; font-size: 0.8rem; }

    section { margin-bottom: 28px; }
    section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 12px;
      align-items: start;
    }

    .card-main { grid-column: 1; }
    .card-actions { grid-column: 2; display: flex; gap: 6px; align-items: flex-start; padding-top: 2px; }

    .card-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; }
    .card-meta  { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 4px; }

    .tag {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 12px;
    }
    .tag-financial { background: var(--tag-financial); color: var(--tag-financial-text); }
    .tag-other     { background: var(--tag-other);     color: var(--tag-other-text); }

    .card-party  { font-size: 0.85rem; font-weight: 500; color: var(--muted); }
    .card-amount { font-size: 0.95rem; font-weight: 700; color: var(--text); }
    .card-date   { font-size: 0.8rem; color: var(--muted); }
    .card-detail { font-size: 0.82rem; color: var(--muted); margin-top: 4px; white-space: pre-wrap; }

    .overdue  { border-left: 4px solid var(--danger); }
    .due-soon { border-left: 4px solid #f9a825; }

    .empty { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 24px 0; }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h3 { margin-bottom: 16px; font-size: 1rem; }

    label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 4px; margin-top: 12px; }
    input, select, textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: inherit;
    }
    textarea { min-height: 80px; resize: vertical; }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    .status-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #333; color: #fff;
      font-size: 0.8rem; padding: 8px 16px;
      display: none;
      z-index: 200;
    }
    .status-bar.show { display: block; }
    .status-bar.error { background: var(--danger); }

    @media (max-width: 480px) {
      .card { grid-template-columns: 1fr; }
      .card-actions { grid-column: 1; flex-direction: row; margin-top: 8px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Mum &amp; Dad Banking</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn-small" id="refreshBtn" onclick="loadItems()">Refresh</button>
    <button class="btn-primary" onclick="openAddModal()">+ Add item</button>
  </div>
</header>

<section>
  <h2>Unresolved</h2>
  <div id="unresolvedList"><p class="empty">Loading…</p></div>
</section>

<section>
  <h2>Resolved</h2>
  <div id="resolvedList"><p class="empty">Loading…</p></div>
</section>

<!-- Add item modal -->
<div class="modal-backdrop" id="addModal">
  <div class="modal">
    <h3>Add item</h3>
    <label>Title *<input id="f-title" type="text" placeholder="e.g. Orcon bill payment"></label>
    <label>Party *<input id="f-party" type="text" placeholder="e.g. Orcon"></label>
    <label>Category
      <select id="f-category">
        <option value="financial">Financial</option>
        <option value="other">Other</option>
      </select>
    </label>
    <label>Due date *<input id="f-actionDate" type="date"></label>
    <label>Amount<input id="f-amount" type="text" placeholder="e.g. $439.99"></label>
    <label>Detail<textarea id="f-detail" placeholder="Any extra context…"></textarea></label>
    <div class="modal-actions">
      <button class="btn-small" onclick="closeAddModal()">Cancel</button>
      <button class="btn-primary" onclick="submitAdd()">Add</button>
    </div>
  </div>
</div>

<div class="status-bar" id="statusBar"></div>

<script>
// GAS web app URL — safe to hardcode (not a secret)
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxXJyqsoefTpIA4X6ThP24lTrgD3X7a-mD8DyGq_ad6LAgpXFqkNjbE6UdohLwdxA_nGg/exec';

// Token is stored in localStorage, never in source code.
// On first load the user is prompted to enter it.
function getToken() {
  return localStorage.getItem('mbd_token') || '';
}

function promptForToken() {
  var t = window.prompt('Enter the API token for this dashboard:');
  if (t && t.trim()) {
    localStorage.setItem('mbd_token', t.trim());
    return t.trim();
  }
  return '';
}

var allItems = [];

async function api(action, params) {
  var token = getToken();
  if (!token) {
    token = promptForToken();
    if (!token) throw new Error('No token — cannot connect.');
  }
  var body = { token: token, action: action, params: params || {} };
  var resp = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
    redirect: 'follow'
  });
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  var data = await resp.json();
  if (data && data.error === 'Unauthorized') {
    localStorage.removeItem('mbd_token');
    throw new Error('Wrong token — cleared. Refresh to try again.');
  }
  if (data && data.error) throw new Error(data.error);
  return data;
}

async function loadItems() {
  document.getElementById('refreshBtn').disabled = true;
  try {
    allItems = await api('getItems');
    render();
  } catch(e) {
    showStatus('Failed to load: ' + e.message, true);
  } finally {
    document.getElementById('refreshBtn').disabled = false;
  }
}

function render() {
  var today = new Date(); today.setHours(0,0,0,0);
  var soon  = new Date(today); soon.setDate(soon.getDate() + 7);

  var unresolved = allItems.filter(function(i) { return !i.resolved; });
  var resolved   = allItems.filter(function(i) { return  i.resolved; });

  unresolved.sort(function(a,b) { return (a.actionDate||'').localeCompare(b.actionDate||''); });
  resolved.sort(function(a,b)   { return (b.actionDate||'').localeCompare(a.actionDate||''); });

  document.getElementById('unresolvedList').innerHTML =
    unresolved.length ? unresolved.map(function(i) { return cardHTML(i, today, soon); }).join('') : '<p class="empty">Nothing unresolved.</p>';
  document.getElementById('resolvedList').innerHTML =
    resolved.length ? resolved.map(function(i) { return cardHTML(i, today, soon); }).join('') : '<p class="empty">Nothing resolved yet.</p>';
}

function cardHTML(item, today, soon) {
  var dueDate = item.actionDate ? new Date(item.actionDate + 'T00:00:00') : null;
  var cls = '';
  if (dueDate && !item.resolved) {
    if (dueDate < today) cls = 'overdue';
    else if (dueDate <= soon) cls = 'due-soon';
  }
  var tagCls  = item.category === 'financial' ? 'tag-financial' : 'tag-other';
  var tagLabel = item.category === 'financial' ? 'Financial' : 'Other';
  var actions = item.resolved ? '' :
    '<button class="btn-resolve" onclick="resolveItem(\'' + esc(item.id) + '\')">Mark resolved</button>';

  return '<div class="card ' + cls + '">' +
    '<div class="card-main">' +
      '<div class="card-title">' + esc(item.title) + '</div>' +
      '<div class="card-meta">' +
        '<span class="tag ' + tagCls + '">' + tagLabel + '</span>' +
        '<span class="card-party">' + esc(item.party) + '</span>' +
        (item.amount ? '<span class="card-amount">' + esc(item.amount) + '</span>' : '') +
        (item.actionDate ? '<span class="card-date">Due ' + item.actionDate + '</span>' : '') +
      '</div>' +
      (item.detail ? '<div class="card-detail">' + esc(item.detail) + '</div>' : '') +
    '</div>' +
    (actions ? '<div class="card-actions">' + actions + '</div>' : '') +
  '</div>';
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function resolveItem(id) {
  try {
    await api('resolveItem', { id: id });
    var item = allItems.find(function(i) { return i.id === id; });
    if (item) item.resolved = true;
    render();
    showStatus('Marked resolved.');
  } catch(e) {
    showStatus('Error: ' + e.message, true);
  }
}

function openAddModal() {
  document.getElementById('f-actionDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('addModal').classList.add('open');
}
function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
}

async function submitAdd() {
  var title      = document.getElementById('f-title').value.trim();
  var party      = document.getElementById('f-party').value.trim();
  var category   = document.getElementById('f-category').value;
  var actionDate = document.getElementById('f-actionDate').value;
  var amount     = document.getElementById('f-amount').value.trim();
  var detail     = document.getElementById('f-detail').value.trim();

  if (!title || !party || !actionDate) {
    showStatus('Title, Party, and Due date are required.', true);
    return;
  }

  var slug = party.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  var id   = slug + '-' + actionDate;

  try {
    await api('addItem', {
      id: id, category: category, actionDate: actionDate,
      party: party, title: title, amount: amount, detail: detail,
      source: 'manual', isManual: true
    });
    closeAddModal();
    await loadItems();
    showStatus('Item added.');
  } catch(e) {
    showStatus('Error: ' + e.message, true);
  }
}

function showStatus(msg, isError) {
  var bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar show' + (isError ? ' error' : '');
  clearTimeout(bar._t);
  bar._t = setTimeout(function() { bar.classList.remove('show'); }, 3500);
}

loadItems();
</script>
</body>
</html>
